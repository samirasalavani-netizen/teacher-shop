<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پرداخت موفق</title>
<style>
  body{font-family:Vazirmatn,Tahoma,sans-serif;background:#f7f5f0;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
  .box{background:#fff;border:1px solid #e6e2d8;border-radius:16px;padding:32px;text-align:center;max-width:340px;}
  .emoji{font-size:40px;margin-bottom:10px;}
  h1{font-size:19px;margin:0 0 8px;color:#204d37;}
  p{color:#6b6b6b;font-size:14px;line-height:1.8;}
  a.download{display:inline-block;margin-top:14px;background:#2f6f4f;color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:14px;}
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">✅</div>
    <h1>پرداخت با موفقیت انجام شد</h1>
    <p id="details">در حال بارگذاری جزئیات...</p>
    <a class="download" href="#" id="download-link">دانلود فایل</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("productId");
    const refId = params.get("refId");

    const downloadLinks = {
      "class-notebook": "https://class-6-samira.netlify.app",
      "teacher-portfolio": "https://teacher-portfolio-samira.netlify.app",
      "hormoz-game": "#"
    };

    document.getElementById("details").textContent =
      "کد پیگیری تراکنش: " + (refId || "-");
    document.getElementById("download-link").href =
      downloadLinks[productId] || "#";
  </script>
</body>
</html>
